name: Build Executable On Push

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: build-exe-on-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-installer:
    name: Build Installer (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SAPI Bridge (CMake)
        run: cmake -B sapi_bridge/build -S sapi_bridge -G "Visual Studio 17 2022" -A x64

      - name: Build SAPI Bridge
        run: cmake --build sapi_bridge/build --config Release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci

      - name: Build Tauri app
        working-directory: gui
        run: npm run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceLink-build-${{ github.sha }}
          path: |
            gui/src-tauri/target/release/bundle/nsis/*.exe
            sapi_bridge/build/Release/voicelink_sapi.dll
          if-no-files-found: error
          retention-days: 7
